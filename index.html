<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hab Dich Lieb 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #FFB6C1;
      background-image:
        radial-gradient(ellipse at 20% 50%, #ff9db5 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, #ffccd5 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, #ff85a1 0%, transparent 40%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Playfair Display', serif;
    }

    /* Floating hearts container */
    .hearts-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .heart {
      position: absolute;
      display: inline-block;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50% 50% 0 0;
    }

    /* Use emoji hearts for simplicity and charm */
    .heart-emoji {
      position: absolute;
      font-size: 1.5rem;
      animation: floatUp linear infinite;
      opacity: 0;
      user-select: none;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(110vh) rotate(0deg) scale(0.5);
        opacity: 0;
      }
      10% { opacity: 0.9; }
      80% { opacity: 0.7; }
      100% {
        transform: translateY(-10vh) rotate(360deg) scale(1.2);
        opacity: 0;
      }
    }

    /* Main text */
    .center {
      position: relative;
      z-index: 10;
      text-align: center;
    }

    .main-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(4rem, 12vw, 10rem);
      font-style: italic;
      font-weight: 900;
      color: #fff;
      text-shadow:
        0 4px 30px rgba(200, 30, 80, 0.4),
        0 0 60px rgba(255, 100, 140, 0.3),
        4px 4px 0px #e8536e,
        6px 6px 0px #c93157;
      line-height: 1.1;
      letter-spacing: -0.02em;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    .heart-row {
      font-size: clamp(2rem, 5vw, 4rem);
      margin-top: 1rem;
      animation: heartbeat 1.4s ease-in-out infinite;
      display: block;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.3); }
      28% { transform: scale(1); }
      42% { transform: scale(1.2); }
      56% { transform: scale(1); }
    }

    /* Sparkle dots */
    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #fff;
      border-radius: 50%;
      animation: sparkle 2s ease-in-out infinite;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <!-- Floating hearts background -->
  <div class="hearts-bg" id="heartsContainer"></div>

  <!-- Main content -->
  <div class="center">
    <span class="main-text">Hab Dich<br>Lieb</span>
    <span class="heart-row">💕 💖 💕</span>
  </div>

  <script>
    const container = document.getElementById('heartsContainer');
    const heartEmojis = ['💕', '💖', '💗', '💓', '💝', '❤️', '🩷', '💞', '💘'];

    function createHeart() {
      const el = document.createElement('span');
      el.classList.add('heart-emoji');
      el.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];

      const size = Math.random() * 2 + 1;
      const left = Math.random() * 100;
      const duration = Math.random() * 8 + 6;
      const delay = Math.random() * 4;
      const fontSize = (Math.random() * 2 + 1.2).toFixed(1);

      el.style.left = left + 'vw';
      el.style.fontSize = fontSize + 'rem';
      el.style.animationDuration = duration + 's';
      el.style.animationDelay = delay + 's';

      container.appendChild(el);

      // Remove after animation
      setTimeout(() => el.remove(), (duration + delay) * 1000);
    }

    // Create hearts continuously
    for (let i = 0; i < 20; i++) {
      setTimeout(createHeart, i * 300);
    }
    setInterval(createHeart, 400);
  </script>

</body>
</html>
